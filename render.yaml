services:
  # FastAPI 백엔드 웹 서비스
  - type: web
    name: hormuz-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: ARTICLE_SUMMARY_MODELS
        value: models/gemini-3.1-flash-lite,models/gemini-2.5-flash,models/gemini-3-flash-preview

  # 통합 크론 dispatcher: 시장/AIS는 20분마다, 저빈도 작업은 내부 조건으로 실행
  - type: cron
    name: hormuz-cron-dispatcher
    runtime: python
    rootDir: backend
    schedule: "*/20 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.dispatcher
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: AISSTREAM_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
