services:
  # FastAPI 백엔드 웹 서비스
  - type: web
    name: hormuz-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: ARTICLE_SUMMARY_MODELS
        value: models/gemma-3-27b-it

  # 일일 유지보수 잡: PortWatch, EIA 유가·휘발유, 오래된 데이터 정리 (매일 06:00 UTC)
  - type: cron
    name: hormuz-daily-maintenance
    runtime: python
    rootDir: backend
    schedule: "0 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.daily_maintenance
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # 시장 지표 수집 잡 (5분 단위 실시간, 장중/장후 시간대만 수집)
  - type: cron
    name: hormuz-market-ingest
    runtime: python
    rootDir: backend
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.market_ingest
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # 이벤트/RSS 수집 잡 (매 1시간)
  - type: cron
    name: hormuz-events-ingest
    runtime: python
    rootDir: backend
    schedule: "0 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.events_ingest
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # AISStream 실시간 선박 위치 수집 잡 (PortWatch 미공개 최근일 추정치 생성)
  - type: cron
    name: hormuz-shipping-ingest
    runtime: python
    rootDir: backend
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.shipping_ingest
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AISSTREAM_API_KEY
        sync: false

  # 트럼프 소셜 미디어 수집 잡 (매 2시간 :00분)
  - type: cron
    name: hormuz-trump-ingest
    runtime: python
    rootDir: backend
    schedule: "0 */2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.trump_ingest
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # 상황 요약 생성 및 트럼프 포스트 번역 잡 (Gemini, 매 1시간 :10분 — 뉴스 수집 직후)
  - type: cron
    name: hormuz-situation-summary
    runtime: python
    rootDir: backend
    schedule: "10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.situation_summary_ingest
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false

  # summary 재계산 잡 (매 15분, 선박 수집 직후)
  - type: cron
    name: hormuz-summary-rebuild
    runtime: python
    rootDir: backend
    schedule: "5,20,35,50 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m jobs.summary_rebuild
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
